spring:
  threads:
    virtual:
      enabled: true
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:radiologydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true # Prima crea le tabelle, poi esegui data.sql
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
application:
  security:
    jwt:
      secret-key: "R0Y3bXpVbXNkd0NuN0Y1c0g4SjJrTmxwUXN0VndYVlozaDRzNnR3OHg5QT0="
logging:
  pattern:
    level: "%5p [%t]"
  level:
    org.hibernate.SQL: debug